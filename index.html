<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Learning Community</title>
  <!-- Facebook Pixel -->
  <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1529624314673778');
    fbq('track', 'PageView');
  </script>
  <style>
    *{margin:0; padding:0; box-sizing:border-box;}
    html, body{width:100%; height:100%;}
    body{font-family:Arial, Helvetica, sans-serif; background:#0b0b0b; color:#ffffff; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px 16px;}
    .container{width:100%; max-width:420px; text-align:center;}
    h1{font-size:26px; font-weight:800; line-height:1.3; color:#ffffff;}
    .subtitle{margin-top:10px; font-size:16px; color:#cfcfcf; line-height:1.5;}
    .btn{display:inline-block; width:100%; background:#0088cc; color:#ffffff; padding:18px 20px; font-size:19px; font-weight:bold; border-radius:14px; text-decoration:none; margin-top:28px; border:none; cursor:pointer; font-family:inherit; animation:bluePulse 1s infinite; transition:transform .1s ease;}
    .btn:active{transform:scale(0.97);}
    @keyframes bluePulse{0%{box-shadow:0 0 0 0 rgba(0,136,204,0.7);} 70%{box-shadow:0 0 0 18px rgba(0,136,204,0);} 100%{box-shadow:0 0 0 0 rgba(0,136,204,0);}}
    .meta-row{margin-top:18px; display:flex; justify-content:center; gap:16px; flex-wrap:wrap; font-size:13px; color:#aaaaaa;}
    .disclaimer{margin-top:26px; font-size:11px; line-height:1.6; color:#666666;}
    .redirect-note{margin-top:14px; font-size:13px; color:#888888;}
  </style>
</head>
<body>
  <div class="container">
    <h1>Join Our Learning Community</h1>
    <div class="subtitle">Daily market updates and educational content.</div>

    <a class="btn join-link" id="joinBtn" href="https://t.me/+jVfu4LdfrPdkODg1" target="_blank" rel="noopener">
      Join Free Channel
    </a>

    <div class="redirect-note">Redirecting automatically in <span id="t">5</span>s...</div>

    <div class="meta-row">
      <span>Since 2019</span>
      <span>24,000+ Members</span>
    </div>
    <div class="disclaimer">
      Educational content only. Not investment advice. Markets are subject to risk.
    </div>
  </div>

  <script>
    (function () {
      const TELEGRAM_URL = "https://t.me/+jVfu4LdfrPdkODg1";
      let redirected = false; // guards against double-firing

      // 1. Manual click → track Lead, then let the link behave normally
      document.querySelectorAll('.join-link').forEach(function (btn) {
        btn.addEventListener('click', function () {
          redirected = true; // stop the auto-redirect from also firing
          if (typeof fbq === 'function') {
            fbq('track', 'Lead');
          }
          // no preventDefault — target="_blank" link opens Telegram itself
        });
      });

      // 2. Auto redirect after 5s — NO Lead event, only PageView already fired
      let secondsLeft = 5;
      const timerEl = document.getElementById('t');
      const countdown = setInterval(function () {
        if (redirected) {
          clearInterval(countdown);
          return;
        }
        secondsLeft--;
        if (secondsLeft > 0) {
          timerEl.innerText = secondsLeft;
        } else {
          clearInterval(countdown);
          window.location.href = TELEGRAM_URL; // same tab, no Lead tracked
        }
      }, 1000);
    })();
  </script>
</body>
</html>
